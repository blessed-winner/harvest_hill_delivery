        '204':
          description: No response body
components:
  schemas:
    Invoice:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        bikanawe_invoice_id:
          type: string
          readOnly: true
        supply_detail:
          allOf:
          - $ref: '#/components/schemas/SupplyShort'
          readOnly: true
        issue_date:
          type: string
          format: date-time
          readOnly: true
        amount:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
        status:
          $ref: '#/components/schemas/InvoiceStatusEnum'
        supply:
          type: integer
          nullable: true
      required:
      - amount
      - bikanawe_invoice_id
      - id
      - issue_date
      - supply_detail
    InvoiceStatusEnum:
      enum:
      - paid
      - pending
      type: string
      description: |-
        * `paid` - Paid
        * `pending` - Pending
    NegotiationOffer:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        sender:
          type: string
          readOnly: true
        price:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
        quantity:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
        message:
          type: string
        created_at:
          type: string
          readOnly: true
      required:
      - created_at
      - id
      - price
      - quantity
      - sender
    NegotiationThread:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        status:
          type: string
          readOnly: true
        price:
          type: string
          readOnly: true
        supply_detail:
          allOf:
          - $ref: '#/components/schemas/SupplyDetail'
          readOnly: true
        offers:
          type: array
          items:
            $ref: '#/components/schemas/NegotiationOffer'
          readOnly: true
      required:
      - id
      - offers
      - price
      - status
      - supply_detail
    PatchedInvoice:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        bikanawe_invoice_id:
          type: string
          readOnly: true
        supply_detail:
          allOf:
          - $ref: '#/components/schemas/SupplyShort'
          readOnly: true
        issue_date:
          type: string
          format: date-time
          readOnly: true
        amount:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
        status:
          $ref: '#/components/schemas/InvoiceStatusEnum'
        supply:
          type: integer
          nullable: true
    PatchedNegotiationThread:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        status:
          type: string
          readOnly: true
        price:
          type: string
          readOnly: true
        supply_detail:
          allOf:
          - $ref: '#/components/schemas/SupplyDetail'
          readOnly: true
        offers:
          type: array
          items:
            $ref: '#/components/schemas/NegotiationOffer'
          readOnly: true
    PatchedSupply:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        quantity:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
        price:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
        status:
          $ref: '#/components/schemas/StatusB3bEnum'
    Product:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 255
        category:
          type: string
          maxLength: 100
        is_currently_needed:
          type: boolean
        urgency:
          type: string
          maxLength: 20
        unit:
          type: string
          maxLength: 10
        base_price:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
        image:
          oneOf:
          - type: string
            format: uri
            maxLength: 500
          - type: string
            maxLength: 0
        quantity_needed:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
      required:
      - category
      - id
      - name
    ProductShort:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 255
        category:
          type: string
          maxLength: 100
        unit:
          type: string
          maxLength: 10
        image:
          oneOf:
          - type: string
            format: uri
            maxLength: 500
          - type: string
            maxLength: 0
      required:
      - category
      - id
      - name
    StatusB3bEnum:
      enum:
      - draft
      - pending
      - negotiating
      - accepted
      - rejected
      - delivered
      - invoiced
      type: string
      description: |-
        * `draft` - Draft
        * `pending` - Pending
        * `negotiating` - Negotiating
        * `accepted` - Accepted
        * `rejected` - Rejected
        * `delivered` - Delivered
        * `invoiced` - Invoiced
    Supply:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        quantity:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
        price:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
        status:
          $ref: '#/components/schemas/StatusB3bEnum'
      required:
      - id
      - price
      - quantity
    SupplyDetail:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        quantity:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
        unit:
          type: string
          readOnly: true
        proposed_price:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
        status:
          $ref: '#/components/schemas/StatusB3bEnum'
        product_detail:
          allOf:
          - $ref: '#/components/schemas/ProductShort'
          readOnly: true
      required:
      - id
      - product_detail
      - proposed_price
      - quantity
      - unit
    SupplyShort:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        quantity:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
        status:
          $ref: '#/components/schemas/StatusB3bEnum'
        product_detail:
          allOf:
          - $ref: '#/components/schemas/ProductShort'
          readOnly: true
      required:
      - id
      - product_detail
      - quantity
    TokenRefresh:
      type: object
      properties:
        access:
          type: string
          readOnly: true
        refresh:
          type: string
      required:
      - access
      - refresh
  securitySchemes:
    jwtAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
