          description: ''
    put:
      operationId: negotiations_threads_update
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this negotiation thread.
        required: true
      tags:
      - negotiations
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NegotiationThread'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/NegotiationThread'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/NegotiationThread'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NegotiationThread'
          description: ''
    patch:
      operationId: negotiations_threads_partial_update
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this negotiation thread.
        required: true
      tags:
