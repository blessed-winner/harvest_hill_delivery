  /api/supplies/:
    get:
      operationId: supplies_list
      description: |-
        Mixin to enforce role-scoped queryset filtering.
        Ensures non-admin users can only query records owned by them.
      tags:
      - supplies
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Supply'
          description: ''
    post:
      operationId: supplies_create
      description: |-
        Mixin to enforce role-scoped queryset filtering.
        Ensures non-admin users can only query records owned by them.
      tags:
      - supplies
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Supply'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Supply'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Supply'
        required: true
      security:
      - jwtAuth: []
      - {}
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Supply'
          description: ''
  /api/supplies/{id}/:
    get:
      operationId: supplies_retrieve
      description: |-
        Mixin to enforce role-scoped queryset filtering.
        Ensures non-admin users can only query records owned by them.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this supply.
        required: true
      tags:
      - supplies
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Supply'
          description: ''
    put:
      operationId: supplies_update
      description: |-
        Mixin to enforce role-scoped queryset filtering.
        Ensures non-admin users can only query records owned by them.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this supply.
        required: true
      tags:
      - supplies
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Supply'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Supply'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Supply'
        required: true
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Supply'
          description: ''
    patch:
      operationId: supplies_partial_update
      description: |-
        Mixin to enforce role-scoped queryset filtering.
        Ensures non-admin users can only query records owned by them.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this supply.
        required: true
      tags:
      - supplies
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedSupply'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedSupply'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedSupply'
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Supply'
