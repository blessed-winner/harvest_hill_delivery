          application/json:
            schema:
              $ref: '#/components/schemas/PatchedNegotiationThread'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedNegotiationThread'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedNegotiationThread'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NegotiationThread'
          description: ''
    delete:
      operationId: negotiations_threads_destroy
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this negotiation thread.
        required: true
      tags:
      - negotiations
      security:
      - jwtAuth: []
      responses:
        '204':
          description: No response body
  /api/negotiations/threads/{id}/accept/:
    post:
      operationId: negotiations_threads_accept_create
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this negotiation thread.
        required: true
      tags:
