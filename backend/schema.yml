  /api/accounts/token/refresh/:
    post:
      operationId: accounts_token_refresh_create
      description: Subclassed SimpleJWT TokenRefreshView to easily allow custom logging
        or overrides.
      tags:
      - accounts
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenRefresh'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TokenRefresh'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TokenRefresh'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenRefresh'
          description: ''
  /api/farmer/dashboard/earnings-by-category/:
    get:
      operationId: farmer_dashboard_earnings_by_category_retrieve
