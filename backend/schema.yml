openapi: 3.0.3
info:
  title: Harvest Hill Delivery API
  version: 1.0.0
  description: Farmer, Client, and Admin APIs for logistics, supplies, and negotiations.
paths:
  /api/accounts/login/:
    post:
      operationId: accounts_login_create
      tags:
      - accounts
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          description: No response body
  /api/accounts/logout/:
    post:
      operationId: accounts_logout_create
      tags:
      - accounts
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/accounts/me/:
    get:
      operationId: accounts_me_retrieve
      tags:
      - accounts
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/accounts/password-reset/:
    post:
      operationId: accounts_password_reset_create
      tags:
      - accounts
      security:
      - jwtAuth: []
